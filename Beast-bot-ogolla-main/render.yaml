services:
  - type: web
    name: beast-bot-ogolla
    env: docker
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: OWNER_NUMBER
        value: "254141915668"        # ✅ FIX: was missing — owner check always failed
      - key: OWNER_NAME
        value: "Henry Ogolla"
      - key: BOT_NAME
        value: "Henry v19™ Beast Bot"
      - key: OWNER_RECOVERY_SECRET
        sync: false                  # set this in Render dashboard — keep it private
      - key: ADMIN_PASSWORD
        sync: false                  # protects /admin — set in Render dashboard
      - key: BOT_LOGIN_PASS
        sync: false                  # protects .login command — set in Render dashboard
      - key: PORT
        value: 5000
      - key: WEB_PORT
        value: 3000
      # ── Email OTP (optional fallback delivery method on /register) ──────
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: 587
      - key: SMTP_EMAIL
        sync: false                  # the Gmail/SMTP address OTP emails are sent FROM
      - key: SMTP_PASSWORD
        sync: false                  # Gmail: must be a 16-char App Password, not your real password
      - key: SMTP_FROM_NAME
        value: "Henry Tech Bot Panel"
      # ── Optional: send OTPs from a SEPARATE WhatsApp number/session,
      # so codes don't come from the same chat as the main bot. Pair a
      # second number via /pair and put its session name here.
      - key: OTP_SENDER_SESSION_ID
        sync: false
      # ── Optional: the admin's M-Pesa number shown to users for top-ups ──
      - key: ADMIN_PAYTO_NUMBER
        sync: false
    healthCheckPath: /status
