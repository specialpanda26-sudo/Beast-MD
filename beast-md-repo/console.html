<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Console — Beast MD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14171C; --panel:#1B1F26; --panel2:#20242C; --ember:#E8A33D; --ember-dim:#8A6224;
    --bone:#F2EFE9; --ash:#8B93A1; --line:#2A2F38; --good:#4CA870; --bad:#C1553F;
    --bubble-me:#3A3416; --bubble-me-line:#8A6224; --bubble-them:#20242C;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--bone);font-family:'Space Grotesk',sans-serif;height:100vh;overflow:hidden;}
  a{color:inherit;text-decoration:none;}
  .serif{font-family:'Fraunces',serif;font-weight:600;}
  .serif-i{font-family:'Fraunces',serif;font-style:italic;font-weight:500;}
  .mono{font-family:'JetBrains Mono',monospace;}
  button{font-family:inherit;}

  /* ===== GATE (session + OTP login) ===== */
  #gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .gate-box{width:100%;max-width:400px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:32px;}
  .gate-box .logo{display:flex;align-items:center;gap:2px;font-size:20px;margin-bottom:6px;}
  .gate-box .logo .serif-i{color:var(--ember);}
  .gate-box h2{font-family:'Fraunces',serif;font-weight:500;font-size:20px;margin:14px 0 6px;}
  .gate-box p{color:var(--ash);font-size:13px;line-height:1.5;margin-bottom:20px;}
  .gate-box label{display:block;font-size:12px;color:var(--ash);margin-bottom:7px;font-family:'JetBrains Mono',monospace;}
  .gate-box input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:12px 14px;color:var(--bone);font-size:14px;margin-bottom:16px;}
  .gate-box input:focus{outline:none;border-color:var(--ember-dim);}
  .gate-box button{width:100%;padding:13px;border-radius:999px;border:none;background:var(--ember);color:#1A1305;font-weight:600;font-size:14px;cursor:pointer;}
  .gate-box button:disabled{opacity:.4;cursor:not-allowed;}
  .gate-msg{font-size:12.5px;padding:10px 12px;border-radius:8px;margin-bottom:16px;display:none;font-family:'JetBrains Mono',monospace;}
  .gate-msg.show{display:block;}
  .gate-msg.err{background:rgba(193,85,63,0.1);border:1px solid var(--bad);color:var(--bad);}
  .gate-msg.ok{background:rgba(76,168,112,0.1);border:1px solid var(--good);color:var(--good);}
  .gate-step{display:none;}
  .gate-step.active{display:block;}
  .otp-tiles{display:flex;gap:8px;margin-bottom:18px;}
  .otp-tile{width:100%;height:48px;text-align:center;background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--ember);font-size:19px;font-family:'JetBrains Mono',monospace;}
  .otp-tile:focus{outline:none;border-color:var(--ember);}
  .sent-to{font-size:12.5px;color:var(--ash);margin-bottom:16px;}
  .sent-to b{color:var(--bone);}

  /* ===== APP ===== */
  .app{display:none;grid-template-columns:340px 1fr;height:100vh;}
  .app.show{display:grid;}

  .sidebar{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0;}
  .side-top{padding:16px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:8px;font-size:16px;}
  .brand .serif-i{color:var(--ember);}
  .brand small{display:block;font-size:11px;color:var(--good);font-weight:400;font-family:'JetBrains Mono',monospace;}
  .icon-btn{background:none;border:none;color:var(--ash);font-size:16px;cursor:pointer;padding:6px;}
  .icon-btn:hover{color:var(--ember);}
  .search-box{padding:10px 14px;}
  .search-box input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:9px 16px;color:var(--bone);font-size:13px;}
  .search-box input:focus{outline:none;border-color:var(--ember-dim);}

  .conv-list{flex:1;overflow-y:auto;}
  .conv{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid rgba(42,47,56,0.5);}
  .conv:hover{background:var(--panel2);}
  .conv.active{background:var(--panel2);border-left:2px solid var(--ember);}
  .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--ember),var(--ember-dim));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#1A1305;flex-shrink:0;}
  .conv-body{flex:1;min-width:0;}
  .conv-name{font-size:14px;font-weight:600;display:flex;justify-content:space-between;gap:8px;}
  .conv-name .t{font-weight:400;font-size:11px;color:var(--ash);flex-shrink:0;}
  .conv-preview{font-size:12.5px;color:var(--ash);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;display:flex;align-items:center;gap:6px;}
  .unread-badge{background:var(--ember);color:#1A1305;font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:auto;flex-shrink:0;}
  .conv-empty{padding:30px 20px;text-align:center;color:var(--ash);font-size:13px;}

  .chat-pane{display:none;flex-direction:column;min-width:0;background:
    repeating-linear-gradient(45deg, rgba(232,163,61,0.02) 0px, rgba(232,163,61,0.02) 2px, transparent 2px, transparent 40px), var(--bg);}
  .chat-pane.show{display:flex;}
  .chat-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--ash);gap:8px;}
  .chat-placeholder .big{font-family:'Fraunces',serif;font-style:italic;font-size:18px;color:var(--bone);}
  .chat-header{display:flex;align-items:center;gap:12px;padding:13px 20px;background:var(--panel);border-bottom:1px solid var(--line);}
  .chat-header .name{font-size:15px;font-weight:600;}
  .chat-header .sub{font-size:12px;color:var(--ash);}
  .header-actions{margin-left:auto;display:flex;gap:6px;}
  .back-btn{display:none;background:none;border:none;color:var(--bone);font-size:18px;cursor:pointer;margin-right:4px;}

  .messages{flex:1;overflow-y:auto;padding:20px 8vw;display:flex;flex-direction:column;gap:6px;}
  .bubble-row{display:flex;}
  .bubble-row.out{justify-content:flex-end;}
  .bubble{max-width:62%;padding:8px 12px;border-radius:10px;font-size:14px;line-height:1.4;}
  .bubble.in{background:var(--bubble-them);border:1px solid var(--line);border-top-left-radius:2px;}
  .bubble.out{background:var(--bubble-me);border:1px solid var(--bubble-me-line);border-top-right-radius:2px;}
  .bubble .time{display:block;text-align:right;font-size:10.5px;color:var(--ash);margin-top:3px;}
  .load-older{align-self:center;font-size:12px;color:var(--ember);cursor:pointer;padding:6px 14px;margin-bottom:8px;}

  .composer{display:flex;align-items:center;gap:10px;padding:14px 20px;background:var(--panel);border-top:1px solid var(--line);}
  .composer input{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:22px;padding:11px 18px;color:var(--bone);font-size:14px;}
  .composer input:focus{outline:none;border-color:var(--ember-dim);}
  .send-btn{width:40px;height:40px;border-radius:50%;background:var(--ember);border:none;color:#1A1305;font-size:16px;cursor:pointer;flex-shrink:0;}
  .send-btn:disabled{opacity:.4;cursor:not-allowed;}

  /* profile modal */
  .modal{position:fixed;inset:0;background:rgba(10,12,15,0.7);display:none;align-items:center;justify-content:center;z-index:60;}
  .modal.show{display:flex;}
  .modal-box{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:26px;width:340px;}
  .modal-box h3{font-family:'Fraunces',serif;font-weight:600;margin-bottom:16px;font-size:18px;}
  .modal-box label{display:block;font-size:12px;color:var(--ash);margin:12px 0 6px;font-family:'JetBrains Mono',monospace;}
  .modal-box input[type=text],.modal-box textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px 12px;color:var(--bone);font-size:13px;}
  .modal-box textarea{resize:vertical;min-height:60px;}
  .modal-box .row{display:flex;gap:10px;margin-top:20px;}
  .modal-box button{flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:13px;}
  .modal-box .save{background:var(--ember);color:#1A1305;}
  .modal-box .cancel{background:transparent;color:var(--ash);box-shadow:inset 0 0 0 1px var(--line);}

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}

  @media(max-width:760px){
    .app.show{grid-template-columns:1fr;}
    .sidebar{position:fixed;inset:0;z-index:20;}
    .sidebar.hide{display:none;}
    .chat-pane.show{position:fixed;inset:0;z-index:10;}
    .back-btn{display:inline-flex;}
  }
</style>
</head>
<body>

<!-- LOGIN GATE -->
<div id="gate">
  <div class="gate-box">
    <div class="logo"><span class="serif">BEAST</span><span class="serif-i">MD</span></div>
    <h2>Open your console</h2>
    <p>Log in with your paired session to read and send real WhatsApp messages from the browser.</p>

    <div class="gate-msg" id="gate-msg"></div>

    <div class="gate-step active" id="gate-step-session">
      <label>Session ID</label>
      <input type="text" id="session-input" placeholder="e.g. session_a2f9c1">
      <button id="request-otp-btn">Send Login Code</button>
    </div>

    <div class="gate-step" id="gate-step-otp">
      <p class="sent-to">Code sent to <b id="sent-to-num">your number</b></p>
      <div class="otp-tiles" id="gate-otp-tiles">
        <input class="otp-tile mono" maxlength="1" inputmode="numeric">
        <input class="otp-tile mono" maxlength="1" inputmode="numeric">
        <input class="otp-tile mono" maxlength="1" inputmode="numeric">
        <input class="otp-tile mono" maxlength="1" inputmode="numeric">
        <input class="otp-tile mono" maxlength="1" inputmode="numeric">
        <input class="otp-tile mono" maxlength="1" inputmode="numeric">
      </div>
      <button id="verify-otp-btn">Verify & Open Console</button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="sidebar" id="sidebar">
    <div class="side-top">
      <a href="index.html" class="brand">
        <span class="serif">BEAST</span><span class="serif-i">MD</span>
        <small id="session-label">·</small>
      </a>
      <div style="font-size:12px;margin-top:4px;"><a href="panel.html" style="color:inherit;opacity:.7;">Panel</a> · <a href="admin.html" style="color:inherit;opacity:.7;">Admin</a> · <a href="chat.html" style="color:inherit;opacity:.7;">Chat</a></div>
      <button class="icon-btn" id="profile-btn" title="Edit profile">⚙</button>
    </div>
    <div class="search-box"><input type="text" placeholder="Search conversations" id="search-input"></div>
    <div class="conv-list" id="conv-list">
      <div class="conv-empty">Loading conversations…</div>
    </div>
  </div>

  <div class="chat-pane" id="chat-pane">
    <div class="chat-placeholder" id="chat-placeholder">
      <div class="big">Select a conversation</div>
      <div>Pick a contact on the left to see the thread.</div>
    </div>
  </div>
</div>

<!-- PROFILE MODAL -->
<div class="modal" id="profile-modal">
  <div class="modal-box">
    <h3>Update your WhatsApp profile</h3>
    <label>Display name</label>
    <input type="text" id="profile-name" placeholder="Your name">
    <label>Bio</label>
    <textarea id="profile-bio" placeholder="Your about text"></textarea>
    <div class="row">
      <button class="cancel" id="profile-cancel">Cancel</button>
      <button class="save" id="profile-save">Save</button>
    </div>
  </div>
</div>

<script>
  const state = {
    session: '',
    token: '',
    activeContact: null,
    activeName: null,
    es: null,
  };

  const gateMsg = document.getElementById('gate-msg');
  function showGateMsg(text, ok){
    gateMsg.textContent = text;
    gateMsg.className = 'gate-msg show ' + (ok ? 'ok' : 'err');
  }

  // preload session id from ?session= query param if present
  const urlParams = new URLSearchParams(location.search);
  if(urlParams.get('session')) document.getElementById('session-input').value = urlParams.get('session');

  // restore saved login if still valid (per-session token cached locally)
  (function tryRestore(){
    const sess = urlParams.get('session') || localStorage.getItem('beastmd_console_last_session');
    if(!sess) return;
    const saved = JSON.parse(localStorage.getItem('beastmd_console_token_' + sess) || 'null');
    if(saved && saved.expires > Date.now()/1000){
      state.session = sess; state.token = saved.token;
      openConsole();
    }
  })();

  document.getElementById('request-otp-btn').addEventListener('click', async () => {
    const session = document.getElementById('session-input').value.trim();
    if(!session) return showGateMsg('Enter your session ID.', false);
    const btn = document.getElementById('request-otp-btn');
    btn.disabled = true; btn.textContent = 'Sending…';
    try{
      const res = await fetch('/api/console/request-otp', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ session })
      });
      const data = await res.json();
      btn.disabled = false; btn.textContent = 'Send Login Code';
      if(!data.success) return showGateMsg(data.error || 'Could not send code.', false);
      state.session = session;
      document.getElementById('sent-to-num').textContent = data.sent_to;
      document.getElementById('gate-step-session').classList.remove('active');
      document.getElementById('gate-step-otp').classList.add('active');
      gateMsg.className = 'gate-msg';
      document.querySelector('.otp-tile').focus();
    }catch(e){
      btn.disabled = false; btn.textContent = 'Send Login Code';
      showGateMsg('Network error — try again.', false);
    }
  });

  const otpTiles = [...document.querySelectorAll('#gate-otp-tiles .otp-tile')];
  otpTiles.forEach((t,i) => {
    t.addEventListener('input', () => {
      t.value = t.value.replace(/[^0-9]/g,'');
      if(t.value && otpTiles[i+1]) otpTiles[i+1].focus();
    });
    t.addEventListener('keydown', e => { if(e.key==='Backspace' && !t.value && otpTiles[i-1]) otpTiles[i-1].focus(); });
  });

  document.getElementById('verify-otp-btn').addEventListener('click', async () => {
    const otp = otpTiles.map(t => t.value).join('');
    if(otp.length !== 6) return showGateMsg('Enter the full 6-digit code.', false);
    const btn = document.getElementById('verify-otp-btn');
    btn.disabled = true; btn.textContent = 'Verifying…';
    try{
      const res = await fetch('/api/console/verify-otp', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ session: state.session, otp })
      });
      const data = await res.json();
      btn.disabled = false; btn.textContent = 'Verify & Open Console';
      if(!data.success) return showGateMsg(data.error || 'Incorrect code.', false);
      state.token = data.token;
      localStorage.setItem('beastmd_console_last_session', state.session);
      localStorage.setItem('beastmd_console_token_' + state.session, JSON.stringify({
        token: data.token, expires: Date.now()/1000 + data.expires_in
      }));
      openConsole();
    }catch(e){
      btn.disabled = false; btn.textContent = 'Verify & Open Console';
      showGateMsg('Network error — try again.', false);
    }
  });

  function authHeaders(){ return { 'Authorization': 'Bearer ' + state.token, 'Content-Type': 'application/json' }; }
  function initials(name){ return (name||'?').slice(0,2).toUpperCase(); }
  function fmtTime(ts){ return new Date(ts*1000).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
  function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

  function openConsole(){
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').classList.add('show');
    document.getElementById('session-label').textContent = '● connected';
    loadConversations();
    connectStream();
    setInterval(loadConversations, 8000);
  }

  async function loadConversations(){
    const res = await fetch('/api/console/conversations?session=' + encodeURIComponent(state.session), { headers: authHeaders() });
    const data = await res.json();
    const list = document.getElementById('conv-list');
    if(!data.success || !data.conversations || !data.conversations.length){
      list.innerHTML = '<div class="conv-empty">No conversations yet. Messages sent to your paired number will show up here.</div>';
      return;
    }
    list.innerHTML = '';
    data.conversations.forEach(c => {
      const el = document.createElement('div');
      el.className = 'conv' + (state.activeContact === c.contact ? ' active' : '');
      el.innerHTML = '<div class="avatar">'+initials(c.name || c.contact)+'</div>'+
        '<div class="conv-body"><div class="conv-name"><span>'+escapeHtml(c.name || c.contact)+'</span>'+
        '<span class="t">'+fmtTime(c.timestamp)+'</span></div>'+
        '<div class="conv-preview"><span>'+(c.last_direction==='out' ? 'You: ' : '')+escapeHtml((c.last_message||'').slice(0,40))+'</span>'+
        (c.unread_count ? '<span class="unread-badge">'+c.unread_count+'</span>' : '')+'</div></div>';
      el.addEventListener('click', () => openThread(c.contact, c.name || c.contact));
      list.appendChild(el);
    });
  }

  async function openThread(contact, name){
    state.activeContact = contact; state.activeName = name;
    document.getElementById('chat-pane').classList.add('show');
    document.getElementById('chat-pane').innerHTML = `
      <div class="chat-header">
        <button class="back-btn" id="back-btn">←</button>
        <div class="avatar">${initials(name)}</div>
        <div><div class="name">${escapeHtml(name)}</div><div class="sub">${escapeHtml(contact)}</div></div>
        <div class="header-actions"></div>
      </div>
      <div class="messages" id="thread-messages"></div>
      <div class="composer">
        <input type="text" id="thread-input" placeholder="Type a message" maxlength="2000">
        <button class="send-btn" id="thread-send">➤</button>
      </div>`;
    document.getElementById('back-btn').addEventListener('click', () => {
      document.getElementById('sidebar').classList.remove('hide');
      document.getElementById('chat-pane').classList.remove('show');
    });
    if(window.innerWidth <= 760) document.getElementById('sidebar').classList.add('hide');

    await fetch('/api/console/mark-read', { method:'POST', headers: authHeaders(), body: JSON.stringify({ session: state.session, contact }) });
    loadConversations();

    const res = await fetch('/api/console/messages?session='+encodeURIComponent(state.session)+'&contact='+encodeURIComponent(contact), { headers: authHeaders() });
    const data = await res.json();
    const box = document.getElementById('thread-messages');
    box.innerHTML = '';
    (data.messages || []).forEach(m => box.appendChild(renderBubble(m)));
    box.scrollTop = box.scrollHeight;

    document.getElementById('thread-send').addEventListener('click', sendFromThread);
    document.getElementById('thread-input').addEventListener('keydown', e => { if(e.key==='Enter') sendFromThread(); });
  }

  function renderBubble(m){
    const wrap = document.createElement('div');
    wrap.className = 'bubble-row ' + (m.direction === 'out' ? 'out' : 'in');
    const b = document.createElement('div');
    b.className = 'bubble ' + (m.direction === 'out' ? 'out' : 'in');
    b.innerHTML = escapeHtml(m.body) + '<span class="time">'+fmtTime(m.timestamp)+'</span>';
    wrap.appendChild(b);
    return wrap;
  }

  async function sendFromThread(){
    const input = document.getElementById('thread-input');
    const text = input.value.trim();
    if(!text || !state.activeContact) return;
    const btn = document.getElementById('thread-send');
    btn.disabled = true;
    const res = await fetch('/api/console/send', {
      method:'POST', headers: authHeaders(),
      body: JSON.stringify({ session: state.session, to: state.activeContact, text })
    });
    const data = await res.json();
    btn.disabled = false;
    if(data.success){
      input.value = '';
      document.getElementById('thread-messages').appendChild(renderBubble({ body:text, timestamp: Date.now()/1000, direction:'out' }));
      document.getElementById('thread-messages').scrollTop = 999999;
    }
  }

  function connectStream(){
    if(state.es) state.es.close();
    state.es = new EventSource('/api/console/stream?session='+encodeURIComponent(state.session)+'&token='+encodeURIComponent(state.token));
    state.es.onmessage = (evt) => {
      try{
        const ev = JSON.parse(evt.data);
        loadConversations();
        if(ev.contact && ev.contact === state.activeContact){
          const box = document.getElementById('thread-messages');
          if(box){ box.appendChild(renderBubble(ev)); box.scrollTop = 999999; }
        }
      }catch(e){}
    };
    state.es.onerror = () => { /* browser auto-reconnects EventSource */ };
  }

  // profile modal
  const profileModal = document.getElementById('profile-modal');
  document.getElementById('profile-btn').addEventListener('click', () => profileModal.classList.add('show'));
  document.getElementById('profile-cancel').addEventListener('click', () => profileModal.classList.remove('show'));
  document.getElementById('profile-save').addEventListener('click', async () => {
    const name = document.getElementById('profile-name').value.trim();
    const bio = document.getElementById('profile-bio').value.trim();
    if(name) await fetch('/api/console/name', { method:'POST', headers: authHeaders(), body: JSON.stringify({ session: state.session, name }) });
    if(bio) await fetch('/api/console/bio', { method:'POST', headers: authHeaders(), body: JSON.stringify({ session: state.session, text: bio }) });
    profileModal.classList.remove('show');
  });

  document.getElementById('search-input').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('.conv').forEach(el => {
      const name = el.querySelector('.conv-name span').textContent.toLowerCase();
      el.style.display = name.includes(q) ? 'flex' : 'none';
    });
  });
</script>

</body>
</html>
